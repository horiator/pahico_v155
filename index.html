<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAHICO V.155</title>
    <style>
        :root { --blue: #002e5b; --green: #2e7d32; --gold: #f9a825; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .nav { background: var(--blue); color: white; padding: 20px; font-weight: bold; border-bottom: 4px solid var(--gold); }
        .container { max-width: 1100px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #f8f9fa; font-size: 0.8rem; }
        .name-col { text-align: left; font-weight: bold; color: var(--blue); min-width: 120px; }
        .total-col { background: #e7f3ff; font-weight: bold; color: #0056b3; }
        .match-card { border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 6px; background: #fff; }
        .m-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 12px; font-size: 1.1rem; border-bottom: 2px solid #f0f2f5; padding-bottom: 8px; }
        .score-box { background: #333; color: white; padding: 2px 10px; border-radius: 4px; }
        .p-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .p-item { font-size: 0.9rem; padding: 8px; border-radius: 4px; background: #f8f9fa; border-left: 4px solid #ccc; }
        .exact { background: #e8f5e9; border-left-color: var(--green); }
        .outcome { background: #fff8e1; border-left-color: var(--gold); }
    </style>
</head>
<body>

<div class="nav">PAHICO V.155 - SEASON 82</div>

<div class="container">
    <h3>Clasament General</h3>
    <div style="overflow-x: auto;">
        <table id="t-standings">
            <thead><tr id="h-row"><th>Pos</th><th class="name-col">Manager</th></tr></thead>
            <tbody id="b-standings"></tbody>
        </table>
    </div>

    <hr style="margin: 40px 0;">

    <h3>Detalii Etapa</h3>
    <div style="margin-bottom: 20px;">
        <select id="s-week" onchange="render()" style="padding: 10px; font-weight: bold;"></select>
    </div>
    <div id="d-matches"></div>
</div>

<script>
let data = {};
let stats = {};

function getPts(r, p) {
    if(!r || !p || p === "abs" || r === "") return 0;
    const rv = r.split('-').map(Number);
    const pv = p.split('-').map(Number);
    if(rv[0] === pv[0] && rv[1] === pv[1]) return 4;
    const rS = rv[0] > rv[1] ? 1 : (rv[0] < rv[1] ? 2 : 0);
    const pS = pv[0] > pv[1] ? 1 : (pv[0] < pv[1] ? 2 : 0);
    return rS === pS ? 1 : 0;
}

async function init() {
    try {
        const r = await fetch(`date.json?v=${Date.now()}`);
        data = await r.json();
        
        data.managers.forEach(m => stats[m] = { w: {}, t: 0 });
        const weeks = Object.keys(data.schedule).sort((a,b) => a-b);
        
        weeks.forEach(wk => {
            data.managers.forEach(m => stats[m].w[wk] = 0);
            data.schedule[wk].matches.forEach(match => {
                data.managers.forEach(m => {
                    const p = (match.p && match.p[m]) ? match.p[m] : "";
                    const pts = getPts(match.r, p);
                    stats[m].w[wk] += pts;
                    stats[m].t += pts;
                });
            });
        });

        const h = document.getElementById('h-row');
        weeks.forEach(w => {
            h.innerHTML += `<th>W${w}</th>`;
            let opt = document.createElement('option');
            opt.value = w; opt.innerText = `Etapa ${w}`;
            document.getElementById('s-week').appendChild(opt);
        });
        h.innerHTML += `<th class="total-col">TOTAL</th>`;

        const sorted = data.managers.sort((a,b) => stats[b].t - stats[a].t);
        document.getElementById('b-standings').innerHTML = sorted.map((m, i) => `
            <tr>
                <td>${i+1}</td>
                <td class="name-col">${m}</td>
                ${weeks.map(w => `<td>${stats[m].w[w]}</td>`).join('')}
                <td class="total-col">${stats[m].t}</td>
            </tr>
        `).join('');

        const played = weeks.filter(w => data.schedule[w].matches.some(m => m.r !== ""));
        document.getElementById('s-week').value = played.length > 0 ? played[played.length - 1] : "1";
        render();
    } catch(e) { 
        console.error("Eroare JSON:", e);
        document.body.innerHTML += '<div style="color:red; padding:20px;">Eroare: Verifica virgulele in date.json!</div>';
    }
}

function render() {
    const wk = document.getElementById('s-week').value;
    const matches = data.schedule[wk].matches;
    document.getElementById('d-matches').innerHTML = matches.map(m => {
        const hasR = m.r && m.r !== "";
        return `
            <div class="match-card">
                <div class="m-header"><span>${m.t}</span><span class="score-box">${m.r || 'VS'}</span></div>
                <div class="p-grid">
                    ${data.managers.map(mgr => {
                        const p = (m.p && m.p[mgr]) ? m.p[mgr] : "-";
                        const pts = hasR ? getPts(m.r, p) : 0;
                        const cls = pts === 4 ? 'exact' : (pts === 1 ? 'outcome' : '');
                        return `<div class="p-item ${cls}"><b>${mgr}:</b> ${p} ${hasR ? `(${pts}p)` : ''}</div>`;
                    }).join('')}
                </div>
            </div>
        `;
    }).join('');
}
window.onload = init;
</script>
</body>
</html>
